services:
  db:
    image: postgres:16-alpine
    environment:
      # Dummy values for recruitment/test runs when .env is missing.
      POSTGRES_DB: ${POSTGRES_DB:-momentum_task}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_real_env}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-momentum_task}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Dummy value for recruitment/test runs when .env is missing.
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://postgres:change_me_in_real_env@db:5432/momentum_task}
    ports:
      - "8000:8000"
    command: ["/bin/sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    environment:
      # Dummy value for recruitment/test runs when .env is missing.
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://postgres:change_me_in_real_env@db:5432/momentum_task}
    depends_on:
      db:
        condition: service_healthy
    command: ["pytest", "-q", "tests/test_main.py", "tests/test_library_schema.py"]

volumes:
  postgres_data:
